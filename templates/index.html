<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 2rem;
        }

        .add-todo {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .add-todo input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .add-todo input:focus {
            outline: none;
            border-color: #667eea;
        }

        .add-todo button {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .add-todo button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .add-todo button:active {
            transform: translateY(0);
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.2s;
        }

        .todo-item:last-child {
            border-bottom: none;
        }

        .todo-item:hover {
            background: #f8fafc;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .todo-text {
            flex: 1;
            font-size: 1rem;
            word-break: break-word;
        }

        .todo-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .btn-complete {
            background: #10b981;
            color: white;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #667eea;
        }

        @media (max-width: 480px) {
            .header {
                padding: 1.5rem;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .content {
                padding: 1.5rem;
            }

            .add-todo {
                flex-direction: column;
            }

            .add-todo button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Todo App</h1>
            <p>Stay organized, get things done</p>
        </div>
        <div class="content">
            <form class="add-todo" id="addTodoForm">
                <input
                    type="text"
                    id="todoInput"
                    placeholder="What needs to be done?"
                    required
                    autocomplete="off"
                >
                <button type="submit">Add</button>
            </form>
            <ul class="todo-list" id="todoList">
                <li class="loading">Loading todos...</li>
            </ul>
        </div>
    </div>

    <script>
        const API_URL = '/api/todos';
        const todoList = document.getElementById('todoList');
        const todoInput = document.getElementById('todoInput');
        const addTodoForm = document.getElementById('addTodoForm');

        // Fetch and display todos
        async function fetchTodos() {
            try {
                const response = await fetch(API_URL);
                const todos = await response.json();
                renderTodos(todos);
            } catch (error) {
                todoList.innerHTML = '<li class="empty-state">Failed to load todos</li>';
            }
        }

        // Render todos
        function renderTodos(todos) {
            if (todos.length === 0) {
                todoList.innerHTML = `
                    <li class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                        </svg>
                        <p>No todos yet. Add one above!</p>
                    </li>
                `;
                return;
            }

            todoList.innerHTML = todos.map(todo => `
                <li class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                    <input
                        type="checkbox"
                        class="todo-checkbox"
                        ${todo.completed ? 'checked' : ''}
                        onchange="toggleTodo(${todo.id})"
                    >
                    <span class="todo-text">${escapeHtml(todo.task)}</span>
                    <div class="todo-actions">
                        <button class="btn btn-complete" onclick="toggleTodo(${todo.id})">
                            ${todo.completed ? 'Undo' : 'Done'}
                        </button>
                        <button class="btn btn-delete" onclick="deleteTodo(${todo.id})">
                            Delete
                        </button>
                    </div>
                </li>
            `).join('');
        }

        // Add new todo
        async function addTodo(task) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task })
                });
                if (response.ok) {
                    fetchTodos();
                    todoInput.value = '';
                }
            } catch (error) {
                console.error('Failed to add todo:', error);
            }
        }

        // Toggle todo completion
        async function toggleTodo(id) {
            try {
                const response = await fetch(`/api/todos/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: true })
                });
                if (response.ok) {
                    fetchTodos();
                }
            } catch (error) {
                console.error('Failed to toggle todo:', error);
            }
        }

        // Delete todo
        async function deleteTodo(id) {
            if (!confirm('Delete this todo?')) return;
            try {
                const response = await fetch(`/api/todos/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    fetchTodos();
                }
            } catch (error) {
                console.error('Failed to delete todo:', error);
            }
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        addTodoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const task = todoInput.value.trim();
            if (task) {
                addTodo(task);
            }
        });

        // Initial load
        fetchTodos();
    </script>
</body>
</html>
